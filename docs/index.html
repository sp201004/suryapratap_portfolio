  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
  <script src="assets/particles.js"></script>
  <script>
    const typed = new Typed(".typed", {
      strings: [
        "a Software Engineer.",
        "a Cloud & Infrastructure Developer.",
        "an AIOps Engineer.",
        "a Cybersecurity Enthusiast.",
        "a Problem Solver."
      ],
      typeSpeed: 50,
      backSpeed: 25,
      loop: true,
    });

    const socialIcons = document.getElementsByClassName("social-icon");
    const colorClasses = ["g-red", "g-green", "g-yellow", "g-blue"];

    Array.from(socialIcons).forEach((el) => {
      el.addEventListener("mouseenter", () => {
        const randomColor =
          colorClasses[Math.floor(Math.random() * colorClasses.length)];
        el.classList.add(randomColor);
      });
      el.addEventListener("mouseleave", () => {
        for (let index = 0; index < el.classList.length; index++) {
          const element = el.classList[index];
          if (colorClasses.includes(element)) {
            el.classList.remove(element);
            break;
          }
        }
      });
    });
  </script>
